site_name: Documentación de AutoSub-AI

theme:
  name: material

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  
  font:
    text: Roboto
    code: Roboto Mono
    
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - toc.integrate
    - content.code.copy
    - content.code.fold
    - search.suggest
    - search.highlight
    - content.code.tabs

  markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  plugins:
    - search
  
  nav:
    - Inicio: index.md
    - Arquitectura y Diseño:
      - Requisitos del Sistema: arquitectura/requisitos_sistema.md
      - Pipeline de Procesamiento: arquitectura/pipeline_procesamiento.md
      - Integración de Modelos: arquitectura/integracion_modelos.md
    - Desarrollo:
      - Roadmap y Versiones: desarrollo/roadmap.md

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
